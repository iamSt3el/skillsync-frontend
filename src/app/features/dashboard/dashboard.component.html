<div class="dashboard-layout">

  <!-- Mobile overlay backdrop -->
  @if (mobileSidebarOpen()) {
    <div class="mobile-overlay" (click)="mobileSidebarOpen.set(false)"></div>
  }

  <aside class="sidebar-wrap" [class.sidebar-open]="mobileSidebarOpen()">
    <app-sidebar />
  </aside>

  <div class="content-area">

    <!-- ── Permanent Topbar ──────────────────────────── -->
    <header class="topbar">
      <div class="topbar-left">
        <!-- Hamburger (mobile only) -->
        <button class="hamburger-btn" (click)="mobileSidebarOpen.set(!mobileSidebarOpen())" aria-label="Toggle menu">
          <mat-icon>{{ mobileSidebarOpen() ? 'close' : 'menu' }}</mat-icon>
        </button>

        <mat-icon class="topbar-page-icon">{{ pageInfo().icon }}</mat-icon>
        <span class="topbar-page-title">{{ pageInfo().label }}</span>
      </div>

      <div class="topbar-right">
        <!-- Notification Bell -->
        <button class="topbar-icon-btn" [routerLink]="['/dashboard/notifications']"
          [class.has-badge]="unreadCount() > 0" aria-label="Notifications">
          <mat-icon>notifications</mat-icon>
          @if (unreadCount() > 0) {
            <span class="notif-badge">{{ unreadCount() > 9 ? '9+' : unreadCount() }}</span>
          }
        </button>

        <!-- User Avatar -->
        <button class="topbar-avatar-btn" [routerLink]="['/dashboard/profile']" aria-label="Profile">
          @if (authService.currentUser$ | async; as user) {
            <div class="topbar-avatar">
              @if (user.profilePictureUrl) {
                <img class="topbar-avatar-img" [src]="user.profilePictureUrl" [alt]="user.username" />
              } @else {
                {{ userInitials() }}
              }
            </div>
            <div class="topbar-user-info">
              <span class="topbar-username">{{ user.name || user.username }}</span>
              <span class="topbar-role">{{ user.role | titlecase }}</span>
            </div>
          }
        </button>
      </div>
    </header>

    <!-- ── Main Content ──────────────────────────────── -->
    <main class="main-content">
      <router-outlet />
    </main>

  </div>

</div>
